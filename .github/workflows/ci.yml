# Goal: To install docker, build the image for devboard frontend and push to the docker hub, after linting the code.
name: CI

on:
  push:
    branches: [test]

jobs:
  code-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your project's Node version
          #cache: 'yarn'      # Automatically caches dependencies for faster execution

      - name: Install Dependencies
        run: npm ci --prefix frontend       # Clean install that strictly enforces package-lock.json

      - name: Run ESLint
        run: npm run lint --prefix frontend
          
  build-and-push:
    needs: [code-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        
      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend            # <-- adjust to repo path that contains Dockerfile
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-fe-test:latest
